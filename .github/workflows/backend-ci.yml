name: Backend CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - 'middleware/**'
      - 'shared/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'backend/**'
      - 'middleware/**'
      - 'shared/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            middleware/package-lock.json

      - name: Install Middleware Dependencies
        run: |
          cd middleware
          npm install

      - name: Build Middleware
        run: |
          cd middleware
          npm run build

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Build Backend
        run: |
          cd backend
          npm run build

      - name: Run Backend Tests
        run: |
          cd backend
          npm test
